<html lang="vi"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Quản lý Nhân sự</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen w-full flex items-center justify-center selection:bg-gray-200 selection:text-gray-900" style="font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased;">

    <div class="w-full max-w-sm px-8 py-10 bg-white rounded-2xl shadow-[0_2px_10px_-3px_rgba(6,81,237,0.1)] border border-gray-100">
        <div class="flex flex-col items-center mb-8">
            <!-- Logo -->
            <div class="h-10 w-10 bg-gray-900 rounded-xl flex items-center justify-center mb-4 text-white">
                <span class="text-sm font-semibold tracking-tighter">HRM</span>
            </div>
            <h1 class="text-2xl font-semibold tracking-tight text-gray-900">Chào mừng trở lại</h1>
            <p class="text-sm text-gray-500 mt-1">Đăng nhập vào hệ thống nhân sự</p>
        </div>

        <form class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">Tài khoản</label>
                <input type="text" required="" placeholder="admin" class="w-full bg-transparent border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 placeholder-gray-400 transition-shadow">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">Mật khẩu</label>
                <input type="password" required="" placeholder="••••••••" class="w-full bg-transparent border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-gray-400 focus:ring-1 focus:ring-gray-400 placeholder-gray-400 transition-shadow">
            </div>
            
            <!-- Thông báo lỗi (mặc định ẩn, có thể dùng JS để hiển thị) -->
            <div class="hidden bg-red-50 text-red-600 text-xs px-3 py-2 rounded-lg border border-red-100">
                Thông tin đăng nhập không chính xác.
            </div>

            <div class="flex items-center justify-between pt-1">
                <label class="flex items-center gap-2 cursor-pointer">
                    <div class="relative flex items-center">
                        <input type="checkbox" class="peer appearance-none w-4 h-4 border border-gray-300 rounded bg-white checked:bg-gray-900 checked:border-gray-900 focus:outline-none transition-all">
                        <iconify-icon icon="solar:check-read-linear" class="absolute inset-0 text-white opacity-0 peer-checked:opacity-100 pointer-events-none flex items-center justify-center" width="16" stroke-width="1.5"></iconify-icon>
                    </div>
                    <span class="text-xs text-gray-600">Ghi nhớ phiên</span>
                </label>
                <a href="#" class="text-xs text-gray-500 hover:text-gray-900 transition-colors">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="w-full bg-gray-900 text-white hover:bg-gray-800 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors mt-2">
                Đăng nhập
            </button>
        </form>
    </div>


</body></html>
